# Simplex AI — CLI Tool Prompts
# Each tool found on the system PATH gets its prompt injected into the
# system prompt under the "SYSTEM ENVIRONMENT" section.
#
# To add a new tool: add a [command_name] section with a "prompt" field.
# The prompt is the full text injected (description + usage + forbidden).
# Supports multiline with """...""" or '''...''' (TOML triple quotes).

[rg]
prompt = "rg — Fast text search in plain-text files — rg <pattern> [path]. Use -l to list only matching filenames, -i for case-insensitive, -n for line numbers, -c for match count. Use -g <glob> to filter by filename pattern. Forbidden: `grep`."

[fd]
prompt = "fd — Fast file/directory search by name — fd <pattern> [path]. Use -t f for files only, -t d for directories only, -e <ext> for extension filter, -H for hidden files. Supports regex patterns by default. Forbidden: `find`."

[sd]
prompt = "sd — Find & Replace text — sd '<pattern>' '<replacement>' <file...>. Performs in-place replacement by default. Use -p for preview (dry-run, shows changes without writing). Use -F to treat pattern as a literal string (no regex). Forbidden: `sed`."

[bat]
prompt = "bat — File reader with line numbers and syntax highlighting — bat -n <file>. Use --style=plain to strip decorations (line numbers, header), --paging=never for non-interactive output, -l <lang> to force syntax language. Forbidden: `cat`."

[mlr]
prompt = "mlr — Structured CSV/TSV/JSON data processing — Generate Excel-ready data from JSON: mlr --j2c unflatten input.json > data.csv (flattens nested JSON into columns/rows that Excel opens natively). Filter: mlr --csv filter '$col > 100'. Cut columns: mlr --csv cut -f col1,col2. Sort: mlr --csv sort -f col. Stats: mlr --csv stats1 -f col. Group: mlr --csv stats1 -f val -g key. Use --tsv for TSV, --c2j for CSV to JSON. Forbidden: `awk`, `cut`."

[trash-put]
prompt = "trash-put — Move files to trash/recycle bin instead of permanent deletion — trash-put <file...>. Recoverable via system trash manager. Forbidden: `rm`."

[exiftool]
prompt = "exiftool — Extract and edit file metadata — exiftool <file> for all metadata. Extract specific tags: exiftool -TAG <file> (e.g. -CreateDate, -Author, -GPSPosition). Write tags: exiftool -TAG=\"value\" <file>. Write to new file (preserve original): exiftool -o <output> -TAG=\"value\" <input>. Common tags: -Title, -Author, -Subject, -Keywords, -Description. For dates: -CreateDate, -ModifyDate. For GPS: -GPSLatitude, -GPSLongitude. Use -csv for tabular output, -j for JSON."

[pdftotext]
prompt = "pdftotext — Extract text from PDFs — pdftotext -layout <input.pdf> [output.txt] preserves spatial layout. For specific pages: -f <first> -l <last>. Use -nopgbrk to remove page break markers. For non-ASCII text, specify encoding with -enc UTF-8."

[pdfinfo]
prompt = "pdfinfo — Display PDF metadata: pages, author, title, dimensions, security status — pdfinfo <file.pdf>."

[pdfunite]
prompt = "pdfunite — Merge multiple PDFs into one — pdfunite <in1.pdf> <in2.pdf> ... <out.pdf>. Order of input files is significant."

[pdfseparate]
prompt = "pdfseparate — Extract individual pages from a PDF — pdfseparate <input.pdf> <output-%d.pdf>. Use -f <N> for first page, -l <N> for last page. Output pattern uses printf formatting (%d = page number)."

[pdftoppm]
prompt = "pdftoppm — Convert PDF pages to images — pdftoppm <input.pdf> <output_prefix>. Format: -png (lossless, default), -jpeg, -tiff. For print-quality use -r 300 (DPI). Page range: -f <first> -l <last>. Use -singlefile for single-page PDFs (avoids the -1 suffix). Use -cropbox for full media box."

[pdffonts]
prompt = "pdffonts — List all fonts used in a PDF: name, type, encoding, embedded status — pdffonts <file.pdf>."

[pdfimages]
prompt = "pdfimages — Extract embedded images from a PDF — pdfimages <input.pdf> <output_prefix>. By default extracts as PPM/PBM. Use -j for JPEG, -png for PNG, -all for all image types. Page range: -f <first> -l <last>. Use -list to only list images without extracting."

[pandoc_read]
prompt = """
pandoc — Read / extract text from Office documents — Convert .docx, .odt, .epub, .html files to plain text.
WORKFLOW: pandoc <file> -t plain   (outputs plain text to stdout)
Use -t markdown for Markdown output.
Only for reading document content. For creating documents, use pandoc_write (delegated to specialized agents).
"""

[pandoc_write]
prompt = """
pandoc — Create Office documents from Markdown — Generate .docx, .odt, .pptx, .epub, .html.
1. Write content as Markdown with YAML frontmatter (title, author, date)
2. Optional: create metadata JSON for document properties
3. Convert: pandoc content.md [--metadata-file=meta.json] -o output.docx

JSON WORKFLOWS
• Metadata injection: --metadata-file=meta.json auto-fills Title, Author, Date in Word properties
• Template variables: -V recipient="Name" → $recipient$ in Markdown gets replaced at compile time
• JSON → tables: mlr --j2m cat data.json > table.md && pandoc table.md -o data.docx
• AST manipulation: pandoc doc.md -t json → restructure with jq → pandoc -f json -o final.docx

STRUCTURE & STYLING
• Markdown files start with YAML frontmatter for title, author, date, abstract, keywords
• --toc adds table of contents, --number-sections numbers headings
• --reference-doc=<template.docx> applies Word theme, fonts, and styles from a reference file

KEY FORMATS: .docx, .odt, .pptx, .epub, .html
NOTE: PDF documents are created exclusively with weasyprint, not pandoc.
"""

[tesseract]
prompt = "tesseract — OCR text from images and scanned PDFs — tesseract <input.png> <output_base>. Page segmentation mode (--psm): 3 = auto (default), 4 = single column of text, 6 = uniform block of text, 11 = sparse text, 12 = sparse with orientation. Language: -l eng for English, -l ron for Romanian, combine with + (e.g. -l eng+ron). For scanned documents: --dpi 300. Output format: .txt (default), add pdf for searchable PDF, hocr for HTML with position data. First convert PDF to images (pdftoppm) then OCR each page."

[pandas]
prompt = """
pandas — Read Excel/CSV files via Python — Use bash with the scripts venv Python (pandas + openpyxl pre-installed).
Excel: python -c "import pandas; print(pandas.read_excel('file.xlsx').to_string())"
CSV:   python -c "import pandas; print(pandas.read_csv('file.csv').to_string())"
Options: sheet_name='Sheet1' for specific sheet, nrows=50 to limit rows.
"""


