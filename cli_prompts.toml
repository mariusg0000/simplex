# Simplex AI — CLI Tool Prompts
# Each tool found on the system PATH gets its prompt injected into the
# system prompt under the "SYSTEM ENVIRONMENT" section.
#
# To add a new tool: add a [command_name] section with a "prompt" field.
# The prompt is the full text injected (description + usage + forbidden).
# Supports multiline with """...""" or '''...''' (TOML triple quotes).

[rg]
prompt = "rg — Fast text search in plain-text files — rg <pattern> [path]. Use -l to list only matching filenames, -i for case-insensitive, -n for line numbers, -c for match count. Use -g <glob> to filter by filename pattern. Forbidden: `grep`."

[fd]
prompt = "fd — Fast file/directory search by name — fd <pattern> [path]. Use -t f for files only, -t d for directories only, -e <ext> for extension filter, -H for hidden files. Supports regex patterns by default. Forbidden: `find`."

[sd]
prompt = "sd — Find & Replace text — sd '<pattern>' '<replacement>' <file...>. Performs in-place replacement by default. Use -p for preview (dry-run, shows changes without writing). Use -F to treat pattern as a literal string (no regex). Forbidden: `sed`."

[bat]
prompt = "bat — File reader with line numbers and syntax highlighting — bat -n <file>. Use --style=plain to strip decorations (line numbers, header), --paging=never for non-interactive output, -l <lang> to force syntax language. Forbidden: `cat`."

[pandoc_read]
prompt = """
pandoc — Read / extract text from Office documents — Convert .docx, .odt, .epub, .html files to plain text.
WORKFLOW: pandoc <file> -t plain   (outputs plain text to stdout)
Use -t markdown for Markdown output.
Only for reading document content. For creating documents, use pandoc_write (delegated to specialized agents).
"""

[pandoc_write]
prompt = """
pandoc — Create Office documents from Markdown — Generate .docx, .odt, .pptx, .epub, .html.
1. Write content as Markdown with YAML frontmatter (title, author, date)
2. Optional: create metadata JSON for document properties
3. Convert: pandoc content.md [--metadata-file=meta.json] -o output.docx

JSON WORKFLOWS
• Metadata injection: --metadata-file=meta.json auto-fills Title, Author, Date in Word properties
• Template variables: -V recipient="Name" → $recipient$ in Markdown gets replaced at compile time
• JSON → tables: python -c "import pandas; pandas.read_json('data.json').to_csv('table.md', sep='|', index=False)" && pandoc table.md -o data.docx
• AST manipulation: pandoc doc.md -t json → restructure with jq → pandoc -f json -o final.docx

STRUCTURE & STYLING
• Markdown files start with YAML frontmatter for title, author, date, abstract, keywords
• --toc adds table of contents, --number-sections numbers headings
• --reference-doc=<template.docx> applies Word theme, fonts, and styles from a reference file

KEY FORMATS: .docx, .odt, .pptx, .epub, .html
NOTE: PDF documents are created exclusively with weasyprint, not pandoc.
"""

[tesseract]
prompt = "tesseract — OCR text from images and scanned PDFs — tesseract <input.png> <output_base>. Page segmentation mode (--psm): 3 = auto (default), 4 = single column of text, 6 = uniform block of text, 11 = sparse text, 12 = sparse with orientation. Language: -l eng for English, -l ron for Romanian, combine with + (e.g. -l eng+ron). For scanned documents: --dpi 300. Output format: .txt (default), add pdf for searchable PDF, hocr for HTML with position data. For PDF-to-image conversion, use pymupdf (fitz)."

[pymupdf]
prompt = "pymupdf (import fitz) — PDF manipulation via Python (pre-installed in scripts venv). Use `python -c` with fitz for: text extraction (get_text), metadata, merge/split pages, page-to-image (get_pixmap→PNG/JPEG), list fonts, extract images. For PDF creation, delegate to create_pdf tool."

[pandas]
prompt = "pandas — Read/manipulate CSV/TSV/Excel/JSON data via Python (pre-installed in scripts venv). Use `python -c` with pandas. For PDF creation, delegate to create_pdf tool."


